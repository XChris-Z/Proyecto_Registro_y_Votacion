<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007667" />
      <stop offset="100%" stop-color="#003a33" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4BF7A" />
      <stop offset="100%" stop-color="#9A8545" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.35" />
    </filter>
  </defs>
  <!-- Fondo institucional con esquinas redondeadas y borde dorado -->
  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="28" filter="url(#shadow)" />
  <!-- Checkmark de votación de alta visibilidad (nítido en 16x16 y Retina) -->
  <path d="M150 260 L220 330 L362 188" fill="none" stroke="#FFFFFF" stroke-width="56" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Acento dorado bajo el check -->
  <path d="M180 370 L332 370" fill="none" stroke="url(#goldGrad)" stroke-width="28" stroke-linecap="round" />
</svg>
